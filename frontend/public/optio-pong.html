<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Optio PONG — Office Table Tennis</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:#0c0d0f;
    font-family:"Segoe UI", system-ui, -apple-system, sans-serif;
    color:#eef2f5;
    display:flex; align-items:center; justify-content:center;
    height:100%; overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:none;
  }
  #wrap{position:relative;}
  canvas{display:block; max-height:97vh; max-width:97vw; box-shadow:0 50px 120px rgba(0,0,0,.8);}
  .score{
    position:absolute; right:4.5%;
    font-size:34px; font-weight:700; font-variant-numeric:tabular-nums;
    color:rgba(255,255,255,.95); text-shadow:0 2px 12px rgba(0,0,0,.9);
    pointer-events:none; letter-spacing:.5px; text-align:center;
  }
  .score small{display:block; font-size:9px; font-weight:600; letter-spacing:2.5px; opacity:.55; text-transform:uppercase;}
  #s2{top:7%;} #s1{bottom:3.5%;}
  .score.flash{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.45); color:#ffd166;}100%{transform:scale(1);}}
  #msg{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    text-align:center; font-size:13.5px; line-height:1.85; letter-spacing:.3px;
    background:rgba(8,9,11,.85); padding:20px 30px; border-radius:14px;
    backdrop-filter:blur(8px); box-shadow:0 16px 60px rgba(0,0,0,.6);
    pointer-events:none; max-width:82%; border:1px solid rgba(255,255,255,.08);
  }
  #msg.hidden{display:none;}
  kbd{background:#2b2f34; border:1px solid #41464d; border-bottom-width:3px; border-radius:5px; padding:1px 7px; font-size:11.5px; font-family:inherit;}
  #overlayBtn{
    position:absolute; left:50%; top:62%; transform:translateX(-50%);
    padding:11px 30px; font-size:15px; font-weight:700;
    color:#fff; background:#c2452c; border:none; border-radius:8px; cursor:pointer;
    box-shadow:0 4px 0 #8a2e1c; letter-spacing:1px;
  }
  #overlayBtn:active{transform:translate(-50%,3px); box-shadow:0 1px 0 #8a2e1c;}
  #diff{
    position:absolute; top:2%; left:3.5%;
    display:flex; gap:4px; padding:4px;
    background:rgba(15,17,19,.78); border:1px solid rgba(255,255,255,.14);
    border-radius:22px; backdrop-filter:blur(4px);
  }
  #diff button{
    padding:6px 11px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:#aeb6bd; background:transparent; border:none; border-radius:16px; cursor:pointer;
  }
  #diff button.on{color:#fff; background:#2c6e49;}
  #diff button#d3.on{background:#7a2c8f;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<div id="wrap">
  <canvas id="game" width="1086" height="1448"></canvas>
  <div class="score" id="s2"><small>Away · AI</small>0</div>
  <div class="score" id="s1"><small>Home</small>0</div>
  <div id="diff">
    <button id="d0">Beginner</button><button id="d1" class="on">Medium</button><button id="d2">Experienced</button><button id="d3">Ultragod</button>
  </div>
  <div id="msg"></div>
  <button id="overlayBtn" class="hidden">Play again</button>
</div>

<script>
(() => {
'use strict';
const BROWSER = typeof document !== 'undefined' && typeof requestAnimationFrame !== 'undefined';

/* =====================================================================
   DESIGN: "Pong disguised as realistic table tennis."
   - Pong's destination logic survives as a hidden prediction (fold the
     would-be wall ricochet back into the corridor) but the ball is
     steered there along one smooth sidespin curve. No walls, ever.
   - Players are stop-motion photo sprites: each is the real photographed
     businessman split into BODY and ARM+RACKET layers; the arm rotates
     around the shoulder into stroke stances and the visible racket is
     the contact point.
   - Gameplay first: contact is forgiving, returns are ballistically
     aimed at the table, rallies end on bad positioning, not nitpicks.
   ===================================================================== */
const W = 1086, H = 1448;
const TXL = 382, TXR = 695;            // table side edges
const RIM_TOP = 362, RIM_BOT = 992;    // table end lines
const NET_Y = 577;
const PX_M = 230;
const NEUTRAL_DEPTH = 0.85 * PX_M;     // ~0.85-1 m behind the end line
const CORRIDOR = 26;                   // ball corridor inset from table edges
const WIN_SCORE = 11;
const BALL_R = 7, BLADE_R = 17;
const FORGIVE = 10;                     // extra contact forgiveness (gameplay first)
const G = 0.16;

let state  = 'serve';
let server = Math.random() < .5 ? 1 : 2;
let shake  = 0;
let deadTimer = 0, deadWinner = 0, deadNote = '';
let pace = 1;

const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp  = (a,b,t) => a + (b-a)*t;
const gEff  = ts => G * clamp(1 + Math.max(ts,0)*0.45 + Math.min(ts,0)*0.55, 0.55, 1.6);
const angLerp = (a, b, k) => {
  let d = b - a;
  while (d >  Math.PI) d -= 2*Math.PI;
  while (d < -Math.PI) d += 2*Math.PI;
  return a + d * k;
};

/* =====================================================================
   SPRITE LAYER METADATA (photo pixel coords inside each layer image)
   pivot   = shoulder joint the arm rotates around
   racket  = blade center in the neutral pose
   ===================================================================== */
const META = {
  top: {pivot:[30,95],  racket:[64.1,190.5], neutralAng: 1.228,  armLen:101.4, w:121, h:223, scale:1.14},
  bot: {pivot:[135,165],racket:[127.8,32.9], neutralAng:-1.626,  armLen:132.3, w:231, h:333, scale:1.0}
};

/* =====================================================================
   PLAYERS
   p.x, p.y = body center (sprite center) in world coordinates.
   armAng   = world angle shoulder->blade; the racket is always at
              pivotWorld + (cos,sin)(armAng) * armLen — never teleports.
   ===================================================================== */
function makePlayer(f, key){
  const m = META[key];
  const homeY = f === -1 ? RIM_BOT + NEUTRAL_DEPTH : RIM_TOP - NEUTRAL_DEPTH;
  return {
    f, key, m, handSide: f === -1 ? 1 : -1, score: 0,
    x: W/2, y: homeY, vx: 0, vy: 0, homeY, depthTarget: homeY,
    bodyRot: 0, lean: 0, bobP: 0,
    armAng: m.neutralAng + (f === 1 ? 0 : 0), armW: 0,
    prevBlade: null,
    stroke: {phase:'ready', type:'fh_top', committed:'fh_top', t:0, compact:0, plane:0, delay:0},
    hitCooldown: 0,
    label: {text:'', a:0}
  };
}
let p1, p2;

const pivotWorld = p => {
  const m = p.m;
  const ox = (m.pivot[0] - m.w/2)*m.scale, oy = (m.pivot[1] - m.h/2)*m.scale;
  const c = Math.cos(p.bodyRot + p.lean), s = Math.sin(p.bodyRot + p.lean);
  return {x: p.x + ox*c - oy*s, y: p.y + ox*s + oy*c};
};
const bladePos = p => {
  const pv = pivotWorld(p);
  return {x: pv.x + Math.cos(p.armAng)*p.m.armLen*p.m.scale,
          y: pv.y + Math.sin(p.armAng)*p.m.armLen*p.m.scale,
          pv};
};
const hitPlane = p => pivotWorld(p).y + p.f * p.m.armLen * p.m.scale * 0.72;

const ball = {
  x: W/2, y: H/2, vx: 0, vy: 0,
  z: 0, vz: 0, squash: 0,
  steer: 0,          // trajectory assist: constant lateral curve, no walls
  ts: 0,
  lastHitter: 0, bouncedOpp: false, live: false,
  trail: []
};

/* =====================================================================
   INPUT / SOUND / HUD — away player is AI-only with a difficulty picker
   ===================================================================== */
const keys = {};
let touches = {};
const DIFF_LIST = ['beginner','medium','experienced','ultragod'];
let diff = 'medium';
const DIFF = {
  // gain: tracking | jitter: noise | lead: reaction window | anticip: chases the
  // ball's future landing (1) vs its current position (0) | offErr: stance error
  // (more body blocks) | depthK: recovery | aggro: placement | swingErr: mistimes
  // | spd: footwork quality
  beginner:    {gain:.05,  jitter:44, lead:.28, anticip:.15, offErr:38, depthK:.4,  aggro:0,   swingErr:.45, spd:.72, errN:85},
  medium:      {gain:.075, jitter:18, lead:.55, anticip:.55, offErr:14, depthK:.7,  aggro:.2,  swingErr:.12, spd:.95, errN:30},
  experienced: {gain:.12,  jitter:7,  lead:.85, anticip:.88, offErr:5,  depthK:1,   aggro:.35, swingErr:.04, spd:1.1,  reach:5, errN:10},
  ultragod:    {gain:.26,  jitter:2,  lead:1,   anticip:1,   offErr:0,  depthK:1.3, aggro:.4,  swingErr:0,   spd:1.25, reach:12}
};

function bindInput(){
  addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    keys[k] = true;
    if ([' ','arrowleft','arrowright'].includes(k)) e.preventDefault();
    if (k === ' ') tryStart();
  });
  addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
  const cvEl = document.getElementById('game');
  const read = e => {
    const r = cvEl.getBoundingClientRect();
    for (const t of e.touches) touches[t.identifier] =
      { x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height) };
  };
  cvEl.addEventListener('touchstart', e => { read(e); tryStart(); e.preventDefault(); }, {passive:false});
  cvEl.addEventListener('touchmove',  e => { read(e); e.preventDefault(); }, {passive:false});
  cvEl.addEventListener('touchend',   e => { for (const t of e.changedTouches) delete touches[t.identifier]; e.preventDefault(); }, {passive:false});
  cvEl.addEventListener('mousedown', tryStart);
  document.getElementById('overlayBtn').addEventListener('click', resetGame);
  DIFF_LIST.forEach((d, i) => {
    document.getElementById('d'+i).addEventListener('click', () => setDiff(d));
  });
}
function setDiff(d){
  diff = d;
  if (BROWSER) DIFF_LIST.forEach((x, i) =>
    document.getElementById('d'+i).classList.toggle('on', x === d));
}
function tryStart(){
  if (state === 'serve') serve();
  else if (state === 'gameover') resetGame();
}
let AC;
function beep(freq, dur=.05, vol=.18, type='square'){
  if (!BROWSER) return;
  try{
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
  }catch(_){}
}
function updateHUD(){
  if (!BROWSER) return;
  document.getElementById('s1').childNodes[1].nodeValue = p1.score;
  document.getElementById('s2').childNodes[1].nodeValue = p2.score;
}
function flashScore(n){
  if (!BROWSER) return;
  const el = document.getElementById('s'+n);
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}
function setMsg(html){
  if (!BROWSER) return;
  const m = document.getElementById('msg');
  m.innerHTML = html;
  m.classList.toggle('hidden', !html);
}
function showServeMsg(){
  const who = server === 1 ? 'You' : 'Away';
  setMsg(`<b>${who} to serve</b> — <kbd>Space</kbd> or tap<br><br>
  Move with <kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> or <kbd>WASD</kbd> (or drag).<br>
  Step in for short balls, drop back for deep ones — the ball must<br>
  bounce on your side before you can play a full stroke.<br>
  Strokes are automatic. Positioning is the game. First to ${WIN_SCORE}.`);
}

/* =====================================================================
   MATCH FLOW
   ===================================================================== */
function serve(){
  state = 'rally';
  pace = 1;
  const srv = server === 1 ? p1 : p2;
  const bl = bladePos(srv);
  ball.x = bl.x; ball.y = bl.y;
  ball.z = 14; ball.live = true;
  ball.lastHitter = server; ball.bouncedOpp = false;
  ball.steer = 0; ball.ts = 0.2; ball.trail.length = 0;
  const oppMidY = server === 1 ? lerp(RIM_TOP, NET_Y, .45) : lerp(NET_Y, RIM_BOT, .55);
    const aggro = server === 2 ? DIFF[diff].aggro : 0;
  const servTx = server === 2
    ? lerp(W/2 + (Math.random()*180-90), p1.x < W/2 ? TXR - 50 : TXL + 50, aggro*0.6)
    : W/2 + (Math.random()*180-90);
  launch(oppMidY + (Math.random()*60-30), servTx, null, 2.8, 18);
  srv.stroke.phase = 'follow'; srv.stroke.t = 0;
  beep(430,.06,.16,'triangle');
  setMsg('');
}

/* Ballistic launch with TRAJECTORY ASSIST:
   rawTx = where Pong physics would have aimed (can be off-table wide).
   We fold that ricochet destination back into the corridor and pick a
   constant lateral steer so the ball departs toward the raw direction
   but arrives — on one smooth curve — at the folded Pong destination. */
function launch(ty, foldTx, rawTx, vz, maxSpeed){
  const g0 = gEff(ball.ts);
  const z0 = Math.max(ball.z, 1);
  const flightTime = v => (v + Math.sqrt(v*v + 2*g0*z0)) / g0;
  let tb = flightTime(vz);
  if (Math.abs(ty - ball.y) / tb > maxSpeed){
    // need more airtime: loft higher, then recompute the REAL flight time
    const tbWant = Math.abs(ty - ball.y) / (maxSpeed*0.96);
    vz = Math.max((0.5*g0*tbWant*tbWant - z0) / tbWant, 1.2);
    tb = flightTime(vz);
  }
  ball.vz = vz;
  ball.vy = (ty - ball.y) / tb;
  if (rawTx === null){
    ball.vx = (foldTx - ball.x) / tb;
    ball.steer = 0;
    return;
  }
  // One continuous sidespin arc: depart partway toward the raw (Pong)
  // direction and bend the whole flight onto the folded destination.
  // Curve strength scales with how extreme the hidden ricochet was, and
  // the arc's apex is kept inside the corridor — but where the apex sits
  // varies with each shot's geometry, so nothing reads as a wall.
  const L = TXL + CORRIDOR - 14, R = TXR - CORRIDOR + 14;
  const vF = (foldTx - ball.x) / tb;          // straight to the destination
  const vR = (rawTx  - ball.x) / tb;          // the hidden ricochet direction
  let bend = 0.6;                              // how much of the raw angle shows
  for (let i = 0; i < 8; i++){
    const vx0 = vF + (vR - vF)*bend;
    const a = 2*(vF - vx0)/tb;
    let ok = Math.abs(a) <= 0.5;
    if (ok && a !== 0){
      const tap = -vx0/a;                      // apex of the lateral parabola
      if (tap > 0 && tap < tb){
        const apex = ball.x + vx0*tap + 0.5*a*tap*tap;
        ok = apex > L && apex < R;
      }
      ok = ok && Math.abs(vx0 + a*tb) < 5;     // arc completes its turn
    }
    if (ok){ ball.vx = vx0; ball.steer = a; return; }
    bend *= 0.72;
  }
  ball.vx = vF; ball.steer = 0;                // tiny corrections: barely curve
}
// fold a raw destination into the corridor, exactly like a Pong reflection
function foldX(raw){
  const L = TXL + CORRIDOR, R = TXR - CORRIDOR, span = R - L;
  let m = ((raw - L) % (2*span) + 2*span) % (2*span);
  return L + (m <= span ? m : 2*span - m);
}

function endPoint(winner, note){
  state = 'dead'; deadTimer = 45; deadWinner = winner; deadNote = note;
  ball.live = false;
  beep(winner === 1 ? 640 : 500, .14, .26, 'sawtooth');
  shake = 8;
}
function settlePoint(){
  const winner = deadWinner;
  if (winner === 1) p1.score++; else p2.score++;
  flashScore(winner);
  if (p1.score >= WIN_SCORE || p2.score >= WIN_SCORE){
    state = 'gameover';
    const name = winner === 1 ? 'You win' : 'The AI wins';
    setMsg(`🏆 <b>${name} ${Math.max(p1.score,p2.score)}–${Math.min(p1.score,p2.score)}</b>`);
    if (BROWSER) document.getElementById('overlayBtn').classList.remove('hidden');
  } else {
    state = 'serve';
    server = winner === 1 ? 2 : 1;
    showServeMsg();
  }
  updateHUD();
}
function resetGame(){
  p1 = makePlayer(-1, 'bot');
  p2 = makePlayer( 1, 'top');
  server = Math.random() < .5 ? 1 : 2;
  state = 'serve'; pace = 1;
  if (BROWSER) document.getElementById('overlayBtn').classList.add('hidden');
  updateHUD(); showServeMsg();
}

/* =====================================================================
   MOVEMENT — body translate w/ momentum + bob/lean; depth controller
   keeps players ~1 m back, stepping in for short balls, recovering after
   ===================================================================== */
const ACCEL = 1.0, FRICTION = 0.875, MAXV = 9.5;

function movePlayer(p, input, depthK, spd = 1){
  const ix = typeof input === 'object' ? input.x : input;
  const iy = typeof input === 'object' ? input.y : null;
  if (ix !== 0) p.vx += ix * ACCEL * spd;
  p.vx *= FRICTION;
  p.vx = clamp(p.vx, -MAXV*spd, MAXV*spd);
  p.x = clamp(p.x + p.vx, TXL - 130, TXR + 130);

  if (iy === null){
    // AI: automatic depth controller
    const dy = p.depthTarget - p.y;
    p.vy = clamp(p.vy + clamp(dy*0.02*depthK, -.7, .7), -6, 6);
    p.vy *= 0.85;
  } else {
    // human: manual depth (positioning IS the game) + gentle neutral drift
    if (iy !== 0) p.vy += iy * ACCEL * 0.85;
    else p.vy += clamp((p.homeY - p.y) * 0.004, -.18, .18);
    p.vy *= FRICTION;
    p.vy = clamp(p.vy, -8, 8);
  }
  p.y += p.vy;
  const halfH = p.m.h * p.m.scale / 2;
  p.y = p.f === -1
    ? clamp(p.y, RIM_BOT + 58, Math.min(RIM_BOT + NEUTRAL_DEPTH*1.7, H - halfH - 4))
    : clamp(p.y, Math.max(RIM_TOP - NEUTRAL_DEPTH*1.7, halfH + 4), RIM_TOP - 58);

  p.lean += (clamp(p.vx*0.004, -.04, .04) - p.lean) * 0.12;
  if (Math.abs(p.vx) > .4) p.bobP += Math.abs(p.vx)*0.05;
  p.hitCooldown = Math.max(0, p.hitCooldown - 1);
  p.label.a *= 0.965;
}

function humanInput(p){
  let ix = 0, iy = 0;
  if (keys['arrowleft'] || keys['a'])  ix -= 1;
  if (keys['arrowright'] || keys['d']) ix += 1;
  if (keys['arrowup'] || keys['w'])    iy -= 1;   // toward the table
  if (keys['arrowdown'] || keys['s'])  iy += 1;   // away from the table
  for (const id in touches){
    const t = touches[id];
    if (t.y > H/2){
      ix = clamp((t.x - p.x) / 40, -1, 1);
      iy = clamp((t.y - p.y) / 40, -1, 1);
    }
  }
  return {x: ix, y: iy};
}
let aiTarget = W/2;
function aiInput(p){
  const D = DIFF[diff];
  const incoming = ball.live && ball.vy * p.f < 0;
  if (incoming){
    const pred = predictAtPlane(p);
    const t = pred ? pred.t : 999;
    if (pred && t < 220 * D.lead){
      let px = lerp(ball.x, pred.x, D.anticip);     // weak players chase the ball
      px -= p.handSide * (38 - D.offErr);           // forehand bias, eroded by error
      px += (Math.random()*2 - 1) * D.offErr * 0.6; // sloppy positioning
      px = clamp(px, TXL - 70, TXR + 70);
      aiTarget += (px + (Math.random()*2-1)*D.jitter - aiTarget) * D.gain;
    }
  } else {
    aiTarget += (W/2 - aiTarget) * 0.05 * D.depthK;
  }
  const d = aiTarget - p.x;
  return Math.abs(d) < 7 ? 0 : clamp(d / 30, -1, 1);
}

/* =====================================================================
   STOP-MOTION STROKE SYSTEM
   Five stances; the arm layer rotates around the shoulder into the
   stance, accelerates to meet the ball, follows through, recovers.
   strokeDir(+1 forehand / −1 backhand) works for both players because
   handedness and facing mirror together.
   ===================================================================== */
const STROKES = {
  fh_top:  {name:'FH TOPSPIN',  speed:24, vz:3.2, ts: 1.0, amp:1.05, err:0},
  fh_chop: {name:'FH BACKSPIN', speed:10, vz:3.3, ts:-1.0, amp:0.7,  err:0},
  bh_flick:{name:'BH FLICK',    speed:22, vz:2.7, ts: 0.6, amp:0.55, err:0},
  bh_chop: {name:'BH BACKSPIN', speed: 9, vz:3.4, ts:-1.3, amp:0.6,  err:0},
  block:   {name:'BODY BLOCK',  speed:12, vz:3.0, ts: 0.0, amp:0.2,  err:1}
};

function predictAtPlane(p){
  const plane = hitPlane(p);
  if ((plane - ball.y) / ball.vy <= 0) return null;
  // step a clone of the ball through the exact flight physics
  let x = ball.x, y = ball.y, vx = ball.vx, vy = ball.vy;
  let z = ball.z, vz = ball.vz, steer = ball.steer, ts = ball.ts;
  let bounced = ball.bouncedOpp;
  for (let t = 1; t <= 240; t++){
    vx += steer;
    const offL = (TXL + 8) - x, offR = x - (TXR - 8);
    if (offL > 0 && vx < 1.5){ vx += Math.min(offL*0.012, 0.5); if (vx < 0) vx *= 0.985; }
    if (offR > 0 && vx > -1.5){ vx -= Math.min(offR*0.012, 0.5); if (vx > 0) vx *= 0.985; }
    x += vx; y += vy;
    const g = gEff(ts);
    vz -= g; z += vz;
    if (z <= 0){
      z = 0;
      vz = Math.abs(vz) * (0.6 + Math.max(ts,0)*0.18);
      const kick = 1 + ts * 0.13;
      vx *= kick; vy *= kick;
      ts *= 0.55; steer *= 0.5;
    }
    if (p.f === -1 ? y >= plane : y <= plane)
      return { t, x, z: Math.max(z, 0) };
  }
  return null;
}

function selectStroke(p, pred){
  const dx = (pred.x - p.x) * p.handSide;
  if (Math.abs(dx) < 16) return 'block';
  const high = pred.z > 9;
  if (dx > 0) return high ? 'fh_top'  : 'fh_chop';
  return high ? 'bh_flick' : 'bh_chop';
}

function ballBounceDepth(p){
  const g = gEff(ball.ts);
  const tb = (ball.vz + Math.sqrt(Math.max(ball.vz*ball.vz + 2*g*ball.z,0))) / g;
  return ball.y + ball.vy * tb - p.f * 205;
}

function updateStroke(p, D){
  const s = p.stroke;
  const incoming = ball.live && ball.vy * p.f < 0;
  const pred = incoming ? predictAtPlane(p) : null;

  // depth controller (AI only): short balls pull it in; recover to neutral
  if (D){
    if (pred && pred.t < 130){
      p.depthTarget = clamp(ballBounceDepth(p),
        p.f === -1 ? RIM_BOT + 92 : 64,
        p.f === -1 ? RIM_BOT + NEUTRAL_DEPTH*1.35 : RIM_TOP - 92);
    } else p.depthTarget = p.homeY;
  }

  if (s.phase === 'ready' || s.phase === 'back'){
    if (s.phase === 'ready') s.plane = hitPlane(p);
    if (pred && pred.t < 50){
      if (s.phase === 'ready'){
        s.committed = selectStroke(p, pred);
        if (s.committed !== 'block'){
          const fh = s.committed.startsWith('fh');
          if (D){
            // AI chooses spin deliberately: attack when the human is out of
            // position and the ball sits up; defend when scrambled or low.
            const opp = p === p2 ? p1 : p2;
            const oppOut = Math.abs(opp.x - W/2)/170 + Math.abs(opp.y - opp.homeY)/230;
            const scramble = Math.abs(pred.x - p.x) / 130;
            const attack = (pred.z > 9 ? 0.5 : 0.08) + oppOut*0.4 + D.aggro*0.5
                         - scramble*0.35 + (Math.random()-0.5)*(1.1 - D.anticip);
            s.committed = attack > 0.45 ? (fh ? 'fh_top' : 'bh_flick')
                                        : (fh ? 'fh_chop' : 'bh_chop');
          } else {
            // human: stretched wide -> defensive chop; otherwise height rules,
            // and a floaty incoming chop invites chopping back
            if (Math.abs(pred.x - p.x) > p.m.armLen*p.m.scale*0.95 && Math.sign(p.vx)*(pred.x - p.x) <= 2)
              s.committed = fh ? 'fh_chop' : 'bh_chop';
            else if (ball.ts < -0.4 && pred.z < 16 && Math.random() < 0.5)
              s.committed = fh ? 'fh_chop' : 'bh_chop';
          }
        }
        s.type = s.committed;
        s.phase = 'back'; s.t = 0;
        // AI mistiming: a late read delays the swing into a weak contact
        s.delay = (D && Math.random() < D.swingErr) ? 6 + Math.random()*9 : 0;
      } else {
        s.type = Math.abs((pred.x - p.x) * p.handSide) < 16 ? 'block' : s.committed;
      }
      const inSpeed = Math.hypot(ball.vx, ball.vy);
      s.compact = clamp((inSpeed - 8) / 9, 0, 1);
      s.plane = hitPlane(p);
      const swingFrames = (9 + (1 - s.compact)*5) - s.delay;
      if (pred.t < Math.max(swingFrames, 3)){ s.phase = 'swing'; s.t = 0; }
    } else if (s.phase === 'back' && !pred){
      s.phase = 'ready';
    }
  } else if (s.phase === 'swing'){
    s.t += 1/14;
    if (!incoming || s.t > 1.3){ s.phase = 'follow'; s.t = 0; }
  } else if (s.phase === 'follow'){
    s.t += 1/16;
    if (s.t >= 1){ s.phase = 'ready'; s.t = 0; }
  }

  // ---- arm: rotate toward the stance/ball; rate-limited, no teleports ----
  const def = STROKES[s.type];
  const fh = s.type.startsWith('fh') || s.type === 'block';
  const strokeDir = s.type === 'block' ? 0 : (s.type.startsWith('fh') ? 1 : -1);
  const pv = pivotWorld(p);
  let wantAng, k;
  if (s.phase === 'back'){
    const aimAng = pred ? Math.atan2(s.plane - pv.y, pred.x - pv.x) : p.m.neutralAng;
    wantAng = aimAng + strokeDir * 0.85 * def.amp * (1 - s.compact*0.4);
    k = 0.14;
  } else if (s.phase === 'swing' && pred){
    wantAng = Math.atan2(s.plane - pv.y, pred.x - pv.x);
    k = 0.2 + s.t*0.45;                       // accelerates into contact
  } else if (s.phase === 'follow'){
    wantAng = p.armAng + p.armW * 2.2;        // carry through
    k = 0.12;
  } else {
    wantAng = p.m.neutralAng + p.bodyRot;
    k = 0.10;
  }
  const before = p.armAng;
  p.armAng = angLerp(p.armAng, wantAng, k);
  p.armW = p.armAng - before;                 // angular velocity (swing speed)

  // body rotation into the stroke (stop-motion stance feel)
  let rotTarget = clamp(p.vx*0.01, -.1, .1);
  if (s.phase === 'back')   rotTarget += strokeDir * 0.13 * def.amp;
  if (s.phase === 'swing')  rotTarget += strokeDir * 0.13 * def.amp * (1 - s.t*1.4);
  if (s.phase === 'follow') rotTarget -= strokeDir * 0.08 * def.amp * (1 - s.t);
  p.bodyRot += (rotTarget - p.bodyRot) * 0.14;
}

/* =====================================================================
   BALL — smooth steering instead of walls; spin-aware bounces;
   forgiving racket-face contact with Pong-fold placement
   ===================================================================== */
function updateBall(){
  if (!ball.live) return;

  ball.vx += ball.steer;
  // soft corridor: beyond the outer limits a gentle force bends the path back
  const offL = (TXL + 8) - ball.x, offR = ball.x - (TXR - 8);
  if (offL > 0 && ball.vx < 1.5){ ball.vx += Math.min(offL*0.012, 0.5); if (ball.vx < 0) ball.vx *= 0.985; }
  if (offR > 0 && ball.vx > -1.5){ ball.vx -= Math.min(offR*0.012, 0.5); if (ball.vx > 0) ball.vx *= 0.985; }
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.trail.push({x: ball.x, y: ball.y, z: ball.z});
  if (ball.trail.length > 14) ball.trail.shift();

  const g = gEff(ball.ts);
  ball.vz -= g;
  ball.z += ball.vz;
  if (ball.z <= 0){ ball.z = 0; bounce(); if (!ball.live) return; }
  ball.squash *= 0.82;

  // only a truly scraping ball clips the net (gameplay first)
  const crossedNet = (ball.y - ball.vy < NET_Y) !== (ball.y < NET_Y);
  if (crossedNet && ball.z < 3.5 && ball.x > TXL - 20 && ball.x < TXR + 20){
    beep(180, .12, .2, 'sine');
    return endPoint(ball.lastHitter === 1 ? 2 : 1, 'net');
  }

  contact(p1);
  contact(p2);
  bodySave(p1);
  bodySave(p2);

  if (ball.y > RIM_BOT + 320 || ball.y < RIM_TOP - 320) resolveGround();
}

function bounce(){
  const onTable = ball.x > TXL + 2 && ball.x < TXR - 2 &&
                  ball.y > RIM_TOP + 2 && ball.y < RIM_BOT - 2;
  if (!onTable) return resolveGround();
  const half = ball.y < NET_Y ? 2 : 1;
  if (half === ball.lastHitter)
    return endPoint(ball.lastHitter === 1 ? 2 : 1, 'own half');
  if (ball.bouncedOpp)
    return endPoint(ball.lastHitter, 'double bounce');
  ball.bouncedOpp = true;
  beep(255,.03,.10,'sine'); ball.squash = 1;
  ball.vz = Math.abs(ball.vz) * (0.6 + Math.max(ball.ts,0)*0.18);
  const kick = 1 + ball.ts * 0.13;
  ball.vx *= kick; ball.vy *= kick;
  ball.ts *= 0.55;
  ball.steer *= 0.5;                       // sidespin partly absorbed
}
function resolveGround(){
  if (ball.bouncedOpp) endPoint(ball.lastHitter, 'no return');
  else endPoint(ball.lastHitter === 1 ? 2 : 1, 'out');
}

function contact(p){
  if (p.hitCooldown > 0) return;
  if (ball.vy * p.f > 0) return;
  const bl = bladePos(p);
  // swept, forgiving collision against the visible blade
  const ax = ball.x - ball.vx, ay = ball.y - ball.vy;
  const ex = ball.vx, ey = ball.vy;
  const tt = clamp(((bl.x - ax)*ex + (bl.y - ay)*ey) / (ex*ex + ey*ey || 1), 0, 1);
  const qx = ax + ex*tt, qy = ay + ey*tt;
  const reachBonus = p === p2 ? (DIFF[diff].reach || 0) : 0;
  if (Math.hypot(qx - bl.x, qy - bl.y) > BLADE_R + BALL_R + FORGIVE + reachBonus) return;
  if (ball.z > 30) return;

  const s = p.stroke;
  // CONFIDENCE ZONES: green = clean blade, yellow = edge of reach.
  // A ball that hasn't bounced on this side yet can only be half-volleyed
  // weakly — standing too far forward costs quality, not the rally.
  // zone by stance comfort: a forward-reaching arm is composed, a sideways
  // stretch is defensive — lateral displacement is what positioning controls
  const latFrac = Math.abs(ball.x - bl.pv.x) / (p.m.armLen * p.m.scale);
  const zone = (!ball.bouncedOpp) ? 'red' : latFrac <= 0.62 ? 'green' : 'yellow';
  const swinging = zone !== 'red' && (s.phase === 'swing' || s.phase === 'back');
  const typeName = swinging ? s.type : 'block';
  const def = STROKES[typeName];
  const D = p === p2 ? DIFF[diff] : null;

  const inSpd = Math.hypot(ball.vx, ball.vy);
  const rel = clamp((ball.x - bl.x) / (BLADE_R + FORGIVE), -1, 1);
  let rush = clamp((inSpd - 13) / 9, 0, 1)           // pressured by pace…
           * clamp(0.3 + Math.abs(rel)*1.1, 0, 1.2); // …when out of position
  if (zone === 'green')  rush *= 0.55;               // "I got there."
  if (zone === 'yellow') rush = Math.max(rush, 0.45);
  if (p === p2) rush *= (1.05 - DIFF[diff].anticip*0.55);  // composure
  const timing = clamp((ball.y - s.plane) * p.f / 40, -1, 1);
  const swingSpeed = Math.abs(p.armW) * p.m.armLen;

  // ---- Pong-style raw destination (may be off the table — that's fine,
  //      the trajectory assist folds it back on one smooth curve) ----
  const oppNear = p.f === -1 ? NET_Y + 30 : NET_Y - 30;
  const oppFar  = p.f === -1 ? RIM_TOP + 40 : RIM_BOT - 40;
  let ty = lerp(oppNear, oppFar, 0.5 + 0.2*Math.min(pace-1, 1));
  let rawTx = W/2
    + rel * 260 * (1 - rush*0.55)                // edge -> sharp angle (if unhurried)
    - timing * p.handSide * 170 * (1 - rush*0.4) // early -> cross, late -> line
    + p.vx * 11                                  // hitting on the move
    + (Math.random()*2 - 1) * 65 * rush;         // rushed contact wobbles
  if (D){                                        // AI placement intelligence
    // corners live INSIDE the corridor — aiming past them folds back to center
    const cornerX = p1.x < W/2 ? TXR - CORRIDOR - 6 : TXL + CORRIDOR + 6;
    rawTx = lerp(rawTx, cornerX, D.aggro * 0.55);
    ty    = lerp(ty, oppFar, D.aggro * 0.4);
    // drop shot: punish a human camped deep
    if (D.aggro > 0.5 && p1.y > p1.homeY + 30 && Math.random() < 0.3)
      ty = lerp(oppNear, ty, 0.18);
    // unforced-error spread: low tiers spray their landings (can even miss)
    const eN = D.errN || 0;
    rawTx += (Math.random()*2 - 1) * eN * 1.6;
    ty += (Math.random()*2 - 1) * eN * 0.45;
  }
  if (def.err){                                  // body block: erratic, often short
    rawTx += (Math.random()*260 - 130);
    if (Math.random() < 0.3) ty = lerp(oppNear, ty, 0.3);
  }
  let speed = clamp(def.speed * (0.75 + swingSpeed*0.06) * pace * (D ? 1 + D.aggro*0.1 : 1) * (1 - rush*0.32), 6, 30);
  ball.ts = def.ts;
  if (zone === 'yellow'){
    speed *= 0.84;
    ball.ts = Math.min(ball.ts, 0.3);                // stretched: can't rip topspin
    rawTx = lerp(rawTx, W/2, 0.3);                   // safer placement
  }
  ball.z = Math.max(ball.z, 6);
  launch(ty, foldX(rawTx), rawTx, def.vz * (def.err ? 0.85 + Math.random()*0.4 : 1) + rush*0.5, speed);

  ball.lastHitter = p === p1 ? 1 : 2;
  ball.bouncedOpp = false;
  p.hitCooldown = 25;
  if (def.ts > 0.3)       pace = Math.min(pace + 0.07, 1.65);   // attack: tempo up
  else if (def.ts < -0.3) pace = Math.max(pace - 0.05, 1);      // chop: buy time
  else                    pace = Math.min(pace + 0.02, 1.65);
  p.label = {text: def.name, a: 1, zone};
  s.phase = 'follow'; s.t = 0;
  beep(typeName.includes('top') || typeName.includes('flick') ? 600 : 420, .05, .2);
  shake = 3.5;
}

/* Late but roughly in position? The rally is preserved with an awkward
   emergency body return — weak, erratic, alive — instead of a clean miss. */
function bodySave(p){
  if (p.hitCooldown > 0) return;
  if (ball.lastHitter === (p === p1 ? 1 : 2)) return;
  if (ball.vy * p.f > 0) return;                        // must be coming at them
  const crossed = p.f === -1
    ? (ball.y >= p.y && ball.y - ball.vy < p.y)
    : (ball.y <= p.y && ball.y - ball.vy > p.y);
  if (!crossed) return;
  if (Math.abs(ball.x - p.x) > p.m.armLen*p.m.scale*0.95 || ball.z > 28) return;

  const def = STROKES.block;
  const oppNear = p.f === -1 ? NET_Y + 30 : NET_Y - 30;
  const oppFar  = p.f === -1 ? RIM_TOP + 40 : RIM_BOT - 40;
  let ty = lerp(oppNear, oppFar, 0.3 + Math.random()*0.25);
  let rawTx = W/2 + (Math.random()*340 - 170);
  ball.ts = 0;
  ball.z = Math.max(ball.z, 6);
  launch(ty, foldX(rawTx), rawTx, 3.0 + Math.random()*0.5, 11);
  ball.lastHitter = p === p1 ? 1 : 2;
  ball.bouncedOpp = false;
  p.hitCooldown = 25;
  pace = Math.max(pace - 0.06, 1);
  p.label = {text: 'BODY BLOCK', a: 1, zone: 'red'};
  p.stroke.phase = 'follow'; p.stroke.t = 0;
  p.armAng = angLerp(p.armAng, Math.atan2(ball.y - pivotWorld(p).y, ball.x - pivotWorld(p).x), 0.65);
  beep(330, .06, .18);
  shake = 2.5;
}

function drawPlayer(p){
  const c = cx2d;
  const m = p.m;
  const bob = Math.sin(p.bobP) * 1.6;
  const body = IMGS[p.key + 'Body'], arm = IMGS[p.key + 'Arm'];

  // soft contact shadow
  c.fillStyle = 'rgba(0,0,0,.34)';
  c.beginPath(); c.ellipse(p.x + 4, p.y + 10, 52, 36, 0, 0, 7); c.fill();

  // body layer, rotated about its center
  c.save();
  c.translate(p.x, p.y + bob*0.4);
  c.rotate(p.bodyRot + p.lean);
  c.scale(m.scale, m.scale);
  c.drawImage(body, -m.w/2, -m.h/2);
  c.restore();

  // arm layer, rotated about the shoulder pivot to the live arm angle
  const pv = pivotWorld(p);
  c.save();
  c.translate(pv.x, pv.y + bob*0.4);
  c.rotate(p.armAng - m.neutralAng);
  c.scale(m.scale, m.scale);
  c.drawImage(arm, -m.pivot[0], -m.pivot[1]);
  c.restore();
}

function drawBall(){
  const c = cx2d;
  let bx = ball.x, by = ball.y, z = ball.z, sq = ball.squash;
  if (state === 'serve'){
    const srv = server === 1 ? p1 : p2;
    const bl = bladePos(srv);
    bx = bl.x; by = bl.y; z = 4; sq = 0;
  } else if (!ball.live && state !== 'dead') return;

  // motion trail sells the curve of the trajectory assist
  if (state !== 'serve'){
    for (let i = 0; i < ball.trail.length - 1; i++){
      const t = ball.trail[i], a = (i / ball.trail.length) * 0.16;
      c.fillStyle = `rgba(255,255,250,${a})`;
      c.beginPath(); c.arc(t.x, t.y, BALL_R * (0.5 + i/ball.trail.length*0.4), 0, 7); c.fill();
    }
  }
  const scale = 1 + z * 0.016;
  c.fillStyle = `rgba(0,0,0,${clamp(.45 - z*.012, .1, .45)})`;
  c.beginPath();
  c.ellipse(bx + 2 + z*.22, by + 5 + z*.5, BALL_R*.9, BALL_R*.55, 0, 0, 7);
  c.fill();
  const g = c.createRadialGradient(bx-2, by-2, 1, bx, by, BALL_R*scale);
  g.addColorStop(0, '#ffffff'); g.addColorStop(.75, '#efece4'); g.addColorStop(1, '#d6d2c6');
  c.fillStyle = g;
  c.beginPath();
  c.ellipse(bx, by, BALL_R*scale*(1+sq*.18), BALL_R*scale*(1-sq*.18), 0, 0, 7);
  c.fill();
}

function drawLabels(){
  const c = cx2d;
  for (const p of [p1, p2]){
    if (p.label.a > 0.03){
      const col = p.label.zone === 'green' ? '160,230,170' :
                  p.label.zone === 'yellow' ? '255,214,120' :
                  p.label.zone === 'red' ? '255,150,130' : '255,255,255';
      c.fillStyle = `rgba(${col},${p.label.a*0.9})`;
      c.font = '600 15px "Segoe UI", sans-serif';
      c.textAlign = 'center';
      c.fillText(p.label.text, p.x, p.y - p.m.h/2 - 14);
    }
  }
}

function draw(){
  const c = cx2d;
  c.save();
  if (shake > 0){ c.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake); shake *= .8; if (shake < .4) shake = 0; }
  c.drawImage(IMGS.bg, 0, 0);
  drawPlayer(p2);
  drawPlayer(p1);
  drawBall();
  drawLabels();
  c.restore();
}

/* =====================================================================
   MAIN LOOP
   ===================================================================== */
function update(){
  const D = DIFF[diff];
  movePlayer(p1, humanInput(p1), 1);
  movePlayer(p2, aiInput(p2), D.depthK, D.spd);
  updateStroke(p1, null);
  updateStroke(p2, D);
  updateBall();
  if (state === 'dead' && --deadTimer <= 0) settlePoint();
}

resetGame();

if (BROWSER){
  bindInput();
  cx2d = document.getElementById('game').getContext('2d');
  let loadedN = 0;
  const want = Object.keys(SRC).length;
  for (const k of Object.keys(SRC)){
    IMGS[k] = new Image();
    IMGS[k].onload = () => { if (++loadedN === want) (function loop(){ update(); draw(); requestAnimationFrame(loop); })(); };
    IMGS[k].src = SRC[k];
  }
} else {
  globalThis.__TT = {
    keys, STROKES, setDiff, reset: resetGame,
    step: n => { for (let i = 0; i < n; i++) update(); },
    forceServe: () => { if (state === 'serve') serve(); },
    snap: () => ({ state, s1: p1.score, s2: p2.score, pace, diff,
                   depthHint: (ball.live && ball.vy > 0) ? clamp(ballBounceDepth(p1), RIM_BOT + 92, RIM_BOT + NEUTRAL_DEPTH*1.35) : p1.homeY,
                   bx: ball.x, by: ball.y, bz: ball.z, steer: ball.steer, live: ball.live,
                   p1x: p1.x, p1y: p1.y, p2x: p2.x, p2y: p2.y,
                   blade1: bladePos(p1), arm1: p1.armAng, note: deadNote })
  };
}
})();
</script>
</body>
</html>
